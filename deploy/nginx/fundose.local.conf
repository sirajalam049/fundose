# Fundose — local development (HTTP)
# Dev containers: fundose-backend-dev:8000, fundose-fe-dev:3000 on infra_net.
#
# From monorepo root:
#   bash scripts/bootstrap.sh --dev
# Point infra nginx at /opt/nginx/conf.d/fundose.local.conf and reload nginx.

server {
    listen 80;
    listen [::]:80;

    server_name fundose.local;

    resolver 127.0.0.11 valid=10s ipv6=off;

    access_log  /var/log/nginx/fundose.local.access.log  main;
    error_log   /var/log/nginx/fundose.local.error.log;

    set $fundose_be fundose-backend-dev:8000;
    set $fundose_fe fundose-fe-dev:3000;

    include /etc/nginx/snippets/_fundose-locations.conf;
}
