# Fundose — fundose.in (production)
# Infra nginx terminates TLS; Django (fundose-backend) and Next (fundose-fe) on infra_net.
#
# Setup (from monorepo root, after certbot certs exist for fundose.in):
#   bash scripts/bootstrap.sh
#   docker compose -f <infra>/docker-compose.yml exec nginx nginx -t
#   docker compose -f <infra>/docker-compose.yml exec nginx nginx -s reload

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name fundose.in;

    ssl_certificate     /etc/letsencrypt/live/fundose.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fundose.in/privkey.pem;

    resolver 127.0.0.11 valid=10s ipv6=off;

    access_log  /var/log/nginx/fundose.in.access.log  main;
    error_log   /var/log/nginx/fundose.in.error.log;

    set $fundose_be fundose-backend:8000;
    set $fundose_fe fundose-fe:3000;

    include /etc/nginx/snippets/_fundose-locations.conf;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name www.fundose.in;

    ssl_certificate     /etc/letsencrypt/live/fundose.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fundose.in/privkey.pem;

    return 301 https://fundose.in$request_uri;
}

server {
    listen 80;
    listen [::]:80;

    server_name fundose.in www.fundose.in;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://fundose.in$request_uri;
    }
}
